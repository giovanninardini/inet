[General]
description = "BGP OPEN with RFC 4760 IPv6-unicast MP_REACH installation and MP_UNREACH withdrawal"
network = BgpNetwork
sim-time-limit = 62s
output-scalar-file = results.sca
output-scalar-precision = 2

**.vector-recording = false

# Arp settings
**.arp.retryTimeout = 1s
**.arp.retryCount = 5
**.arp.cacheTimeout = 1s

#tcp settings
**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336
**.tcp.tcpAlgorithmClass = "TcpReno"

# bgp settings
**.bgpConfig = xmldoc("BGPConfig.xml")
**.ipv6.configurator.networkConfiguratorModule = "configurator6"

# Visualizer settings
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true

**.A.snifferIn.config = xmldoc("A_snifferIn.xml")
**.A.snifferOut.config = xmldoc("A_snifferOut.xml")

**.B.snifferIn.config = xmldoc("B_snifferIn.xml")
**.B.snifferOut.config = xmldoc("B_snifferOut.xml")
