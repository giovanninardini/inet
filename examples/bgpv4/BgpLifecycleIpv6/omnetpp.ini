[General]
description = "MP-BGP IPv6 lifecycle operations"
network = BgpNetwork
sim-time-limit = 260s
output-scalar-file = results.sca
output-scalar-precision = 5

**.app[0].**.scalar-recording = true
**.bgp.**.scalar-recording = true
**.scalar-recording = false
**.vector-recording = false

# NIC configuration
**.eth[*].queue.packetCapacity = 100
**.ppp[*].queue.packetCapacity = 100

# TCP settings
**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336
**.tcp.tcpAlgorithmClass = "TcpReno"

# MP-BGP settings
**.bgpConfig = xmldoc("BGPConfig.xml")
**.bgp.ospfRoutingModule = ""
**.bgp.ipv6RoutingTableModule = "^.ipv6.routingTable"
**.ipv6.configurator.networkConfiguratorModule = "configurator6"
**.ospfConfig = xmldoc("OSPFConfig.xml")

# Visualizer settings
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true

# IPv6 application traffic exercises route installation before stop, after restart,
# and after crash/hold-time cleanup.
*.H*.numApps = 1
**.app[0].messageLength = 32 bytes
**.app[0].sendInterval = 5s
**.app[0].localPort = 1234
**.app[0].destPort = 5678

**.H2.app[0].typename = "UdpBasicApp"
**.H2.app[0].destAddresses = "2001:db8:1::11"
**.H2.app[0].startTime = 40s

**.H1.app[0].typename = "UdpSink"
**.H1.app[0].localPort = 5678

# Establish MP-BGP, gracefully stop router A, restart it, then crash it.
*.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='80s'><shutdown module='A'/></at>\n" + \
        "<at t='140s'><startup module='A'/></at>\n" + \
        "<at t='210s'><crash module='A'/></at>\n" + \
        "</script>")
