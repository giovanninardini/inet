[General]
description = "MP-BGP IPv6 failover from a primary path to a backup path"
network = BgpNetwork
sim-time-limit = 115s
output-scalar-file = results.sca
output-scalar-precision = 5

**.app[*].**.scalar-recording = true
**.bgp.**.scalar-recording = true
**.scalar-recording = false
**.vector-recording = false

# NIC configuration
**.eth[*].queue.packetCapacity = 100
**.ppp[*].queue.packetCapacity = 100

# TCP settings for BGP peering
**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336
**.tcp.tcpAlgorithmClass = "TcpReno"

# MP-BGP settings. OSPF is disabled for BGP redistribution; the OSPFConfig.xml
# file only satisfies the inherited BgpRouter OSPF submodule parameters.
**.bgpConfig = xmldoc("BGPConfig.xml")
**.bgp.ospfRoutingModule = ""
**.bgp.ipv6RoutingTableModule = "^.ipv6.routingTable"
**.ipv6.configurator.networkConfiguratorModule = "configurator6"
**.ospfConfig = xmldoc("OSPFConfig.xml")

# Visualizer settings
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true
# RoutingTableCanvasVisualizer is IPv4-only; enabling it in this IPv6 failover
# example makes Qtenv cast IPv6 routing tables to IIpv4RoutingTable.
*.visualizer.routingTableVisualizer.displayRoutingTables = false

# Bidirectional IPv6 application traffic. Packets initially use A-B-D; after B
# crashes and MP-BGP withdraws the primary route, A-C-D becomes the active path.
*.H*.numApps = 2
**.app[*].messageLength = 256 bytes
**.app[*].sendInterval = 100ms
**.app[*].startTime = 60s

*.H1.app[0].typename = "UdpBasicApp"
*.H1.app[0].destAddresses = "2001:db8:202::11"
*.H1.app[0].localPort = 5000
*.H1.app[0].destPort = 6000
*.H1.app[1].typename = "UdpSink"
*.H1.app[1].localPort = 6001

*.H2.app[0].typename = "UdpBasicApp"
*.H2.app[0].destAddresses = "2001:db8:101::11"
*.H2.app[0].localPort = 5001
*.H2.app[0].destPort = 6001
*.H2.app[1].typename = "UdpSink"
*.H2.app[1].localPort = 6000

# Fail the primary transit path after data traffic has been flowing. The BGP
# model does not notify remote peers directly; A and D must discover the failed
# peer through TCP failure detection and then promote the backup Adj-RIB-In route.
*.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='80s'><disconnect src-module='A' dest-module='B'/><disconnect src-module='B' dest-module='D'/><crash module='B'/></at>\n" + \
        "</script>")
