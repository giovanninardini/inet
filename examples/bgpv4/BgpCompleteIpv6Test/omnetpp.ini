[General]
description = "MP-BGP IPv6 complete test"
network = BgpNetwork
sim-time-limit = 200s
output-scalar-file = results.sca
output-scalar-precision = 5

**.app[0].**.scalar-recording = true
**.scalar-recording = false
**.vector-recording = false

# Enable the standard Router IPv6 stack and let BGP install accepted MP-BGP routes.
**.hasIpv6 = true
*.H*.hasIpv4 = false
**.ipv6.configurator.networkConfiguratorModule = "configurator6"
**.bgp.ipv6RoutingTableModule = "^.ipv6.routingTable"

# NIC configuration
**.ppp[*].queue.packetCapacity = 100

# TCP settings
**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336
**.tcp.tcpAlgorithmClass = "TcpReno"

# OSPFv2 keeps the IPv4 control-plane shape identical to BgpCompleteTest.
# IPv6 LAN prefixes are advertised explicitly through MP-BGP networks.
**.ospfConfig = xmldoc("OSPFConfig.xml")

# BGP settings
**.bgpConfig = xmldoc("BGPConfig.xml")

# Visualizer settings
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true

# IPv6 UDP application traffic over MP-BGP-learned routes
*.H*.numApps = 1
**.app[0].messageLength = 32 bytes
**.app[0].sendInterval = 5s
**.app[0].localPort = 1234
**.app[0].destPort = 1234
**.app[0].startTime = 25s

**.HA11.app[0].typename = "UdpBasicApp"
**.HA11.app[0].destAddresses = "2001:db8:4::12"
**.HB11.app[0].typename = "UdpBasicApp"
**.HB11.app[0].destAddresses = "2001:db8:5::12"
**.HD11.app[0].typename = "UdpBasicApp"
**.HD11.app[0].destAddresses = "2001:db8:1::12"
**.HE11.app[0].typename = "UdpBasicApp"
**.HE11.app[0].destAddresses = "2001:db8:2::12"

**.HA12.app[0].typename = "UdpSink"
**.HB12.app[0].typename = "UdpSink"
**.HD12.app[0].typename = "UdpSink"
**.HE12.app[0].typename = "UdpSink"
